# Pre-commit hooks run automatically on `git commit`.
# Install with: pre-commit install
# Or run: ./scripts/install-hooks.sh
#
# Hooks run for both humans and agents; failed hooks abort the commit.

repos:
  - repo: local
    hooks:
      - id: run-tests
        name: Run test suite
        entry: just test
        language: system
        pass_filenames: false
